name: Backup Supabase Database

on:
  schedule:
    # Esegue ogni giorno alle 3:00 (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permette di eseguire manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Create backup directory
        run: mkdir -p backups
      
      - name: Backup database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$DB_URL" --clean --if-exists > backups/backup_$(date +'%Y%m%d_%H%M%S').sql
      
      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backups/
          retention-days: 30
      
      - name: Commit and push backup to repository
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add backups/
          git commit -m "Backup: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
